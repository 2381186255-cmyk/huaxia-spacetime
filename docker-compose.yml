version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: huaxia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: huaxia_spacetime
      POSTGRES_USER: huaxia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-huaxia_dev_2024}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huaxia -d huaxia_spacetime"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: huaxia-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 可选：FastAPI空间分析服务
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: huaxia-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://huaxia:${POSTGRES_PASSWORD:-huaxia_dev_2024}@postgres:5432/huaxia_spacetime
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
